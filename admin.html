<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>在庫管理（管理者専用）</title>
<style>
body{
  font-family:"Noto Sans JP",sans-serif;
  background:#2c2c2c;
  color:#fff;
  padding:20px;
}
.card{
  max-width:720px;
  margin:auto;
  background:#3a3a3a;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}
h2{text-align:center;margin-bottom:10px;}
.subtitle{text-align:center;font-size:13px;opacity:.7;margin-bottom:15px;}
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  gap:10px;
}
#search{
  flex:1;
  padding:6px 10px;
  border-radius:6px;
  border:none;
}
.total-stock{
  font-weight:700;
  background:#4f8f4f;
  padding:6px 10px;
  border-radius:6px;
}
.row{
  display:grid;
  grid-template-columns:1fr 120px;
  gap:10px;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  background:#444;
  align-items:center;
}
.row.low{ background:#663333; }
.row.zero{ background:#802222; }

input{
  padding:6px;
  border-radius:6px;
  border:none;
  text-align:right;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  font-weight:700;
  cursor:pointer;
}
.save{background:#4f8f4f;color:#fff;}
.logout{background:#b64a4a;color:#fff;}
</style>
</head>

<body>
<div class="card">
  <h2>📦 在庫管理ページ</h2>
  <div class="subtitle">GitHub在庫と連動</div>

  <div class="top-bar">
    <input type="text" id="search" placeholder="素材名で検索…">
    <div class="total-stock" id="totalStock">合計: 0</div>
  </div>

  <div id="stockList"></div>

  <button class="save" id="saveBtn">在庫を保存</button>
  <button class="logout" id="logoutBtn">ログアウト</button>
</div>

<script>
const ADMIN_PASS="851312";
if(localStorage.getItem("isAdmin")!=="true"){
  const pass=prompt("管理者パスワードを入力");
  if(pass!==ADMIN_PASS){alert("パスワードが違います");location.href="index.html";}
  else localStorage.setItem("isAdmin","true");
}

const DATA_URL = "https://rune0000.github.io/tanupon/docs/data/items.json";
const API_URL  = "https://tanupon-git-main-rune0000s-projects.vercel.app/api/update-stock";

let stockData=[];

const list=document.getElementById("stockList");
const totalStockEl=document.getElementById("totalStock");

async function loadStock(){
  const res = await fetch(DATA_URL + "?t=" + Date.now());
  stockData = await res.json();
  render();
}

function render(){
 list.innerHTML="";
 let total=0;

 stockData.forEach(item=>{
   total += item.available;

   let cls="";
   if(item.available===0) cls="zero";
   else if(item.available<50) cls="low";

   list.innerHTML+=`
     <div class="row ${cls}" data-id="${item.id}">
       <span>${item.name}</span>
       <input type="number" value="${item.available}" data-id="${item.id}">
     </div>
   `;
 });

 totalStockEl.textContent="合計: "+total.toLocaleString();
}

/* ⭐ 修正ポイントここ */
document.getElementById("saveBtn").onclick = async ()=>{
  try{
    for(const input of document.querySelectorAll("#stockList input")){
      const id = input.dataset.id;
      const newVal = Number(input.value);

      const item = stockData.find(i=>i.id===id);
      if(!item) continue;

      const delta = newVal - item.available;
      if(delta===0) continue;

      const res = await fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ id, delta })
      });

      if(!res.ok){
        const text = await res.text();
        throw new Error(text);
      }
    }

    alert("在庫を更新しました");
    loadStock();

  }catch(err){
    alert("保存失敗:\n" + err.message);
    console.error(err);
  }
};

document.getElementById("search").addEventListener("input",e=>{
 const word=e.target.value;
 document.querySelectorAll(".row").forEach(r=>{
   r.style.display=r.textContent.includes(word)?"grid":"none";
 });
});

document.getElementById("logoutBtn").onclick=()=>{
 localStorage.setItem("isAdmin","false");
 location.href="index.html";
};

loadStock();
</script>
</body>
</html>
